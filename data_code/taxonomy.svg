  <g class="sans label" text-anchor="middle">
    <text x="520" y="430"><tspan x="520">Structural &amp; cognitive</tspan><tspan x="520" dy="34">accessibility</tspan></text>
    <text x="845" y="430"><tspan x="845">Variable attribution</tspan><tspan x="845" dy="34">&amp; interaction</tspan></text>
    <text x="1170" y="430"><tspan x="1170">Physical &amp; knowledge</tspan><tspan x="1170" dy="34">consistency</tspan></text>
    <text x="1495" y="430"><tspan x="1495">Numerical &amp; structural</tspan><tspan x="1495" dy="34">robustness</tspan></text>
    <text x="1820" y="430"><tspan x="1820">Human utility</tspan><tspan x="1820" dy="34">&amp; auditability</tspan></text>
  </g>

