  <g class="sans label" text-anchor="middle">
    <text x="572" y="945"><tspan x="572">Predictive</tspan><tspan x="572" dy="34">performance</tspan></text>
    <text x="978" y="945"><tspan x="978">Hard feasibility</tspan><tspan x="978" dy="34">filters</tspan></text>
    <text x="1382" y="945"><tspan x="1382">Pareto</tspan><tspan x="1382" dy="34">analysis</tspan></text>
    <text x="1787" y="945"><tspan x="1787">Rank uncertainty</tspan><tspan x="1787" dy="34">&amp; GSA</tspan></text>
  </g>
  <text class="sans footer" x="1024" y="1096" text-anchor="middle">Interpretability is profiled; deployment choice is a separate, auditable decision.</text>
</svg>
