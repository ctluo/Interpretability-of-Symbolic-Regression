<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="1152" viewBox="0 0 2048 1152" role="img" aria-labelledby="title desc">
  <title id="title">Two-layer organization of symbolic-model assessment</title>
  <desc id="desc">Layer A profiles five dimensions of interpretability. Layer B separates deployment decision and selection into four auditable criteria.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#f5faff"/><stop offset="1" stop-color="#e7f1f9"/></linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#fff8f7"/><stop offset="1" stop-color="#fcebea"/></linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="145%"><feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#24384a" flood-opacity=".12"/></filter>
    <style>
      .sans{font-family:"Segoe UI",Arial,Helvetica,sans-serif}.title{font-size:53px;font-weight:750;fill:#102e50}.layerA{font-size:34px;font-weight:750;fill:#123f67}.layerB{font-size:34px;font-weight:750;fill:#7d241c}.label{font-size:25px;font-weight:550;fill:#20303f}.iconA{fill:none;stroke:#145b90;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}.iconB{fill:none;stroke:#b3261e;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}.footer{font-size:27px;font-style:italic;fill:#34495e}
    </style>
  </defs>
